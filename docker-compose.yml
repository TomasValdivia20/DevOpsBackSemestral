name: CI/CD Backend — Innovatech Chile

on:
  push:
    branches:
      - deploy

env:
  IMAGE_VENTAS: tomasvaldivia20/backend-ventas
  IMAGE_DESPACHOS: tomasvaldivia20/backend-despachos

jobs:
  build-ventas:
    name: Build & Push — Servicio Ventas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: tomasvaldivia20
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./back-Ventas_SpringBoot/Springboot-API-REST
          file: ./back-Ventas_SpringBoot/Springboot-API-REST/Dockerfile
          push: true
          tags: tomasvaldivia20/backend-ventas:latest

  build-despachos:
    name: Build & Push — Servicio Despachos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: tomasvaldivia20
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          file: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO/Dockerfile
          push: true
          tags: tomasvaldivia20/backend-despachos:latest

  deploy:
    name: Deploy en EC2 Backend
    runs-on: ubuntu-latest
    needs: [build-ventas, build-despachos]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copiar archivos (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_BACKEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          proxy_host: ${{ secrets.EC2_FRONTEND_HOST }}   
          proxy_username: ${{ secrets.EC2_USER }}        
          proxy_key: ${{ secrets.EC2_SSH_KEY }}         
          source: "docker-compose.yml,init.sql"
          target: "/home/ubuntu/backend"

      - name: Ejecutar comandos (SSH)
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        with:
          host: ${{ secrets.EC2_BACKEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          proxy_host: ${{ secrets.EC2_FRONTEND_HOST }}
          proxy_username: ${{ secrets.EC2_USER }}
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_TOKEN,MYSQL_ROOT_PASSWORD,DB_USERNAME,DB_PASSWORD
          script: |
            set -e
            cd /home/ubuntu/backend

            echo "--- Login Docker Hub ---"
            echo "$DOCKERHUB_TOKEN" | docker login -u tomasvaldivia20 --password-stdin

            echo "--- Creando .env ---"
            # IMPORTANTE: No usamos llaves de GitHub aquí, solo variables de bash
            printf "MYSQL_ROOT_PASSWORD=%s\nDB_USERNAME=%s\nDB_PASSWORD=%s\n" \
            "$MYSQL_ROOT_PASSWORD" "$DB_USERNAME" "$DB_PASSWORD" > .env

            echo "--- Pull de imágenes ---"
            docker pull tomasvaldivia20/backend-ventas:latest
            docker pull tomasvaldivia20/backend-despachos:latest

            echo "--- Reiniciando con Docker Compose ---"
            # Intentamos con guion, que es el que tu server acepta
            docker-compose up -d --no-deps ventas despachos
            
            docker image prune -f
            echo "--- ¡EXITO! ---"