version: '3.8'

services:
  # Servicio Ventas
  ventas:
    image: tomasvaldivia20/backend-ventas:latest
    container_name: ventas-container
    restart: always
    env_file:
      - .env
    ports:
      - "8081:8081"
    networks:
      - app-network

  # Servicio Despachos
  despachos:
    image: tomasvaldivia20/backend-despachos:latest
    container_name: despachos-container
    restart: always
    env_file:
      - .env
    ports:
      - "8082:8082"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge