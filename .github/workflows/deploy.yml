# .github/workflows/deploy.yml — Backend Innovatech Chile
# Trigger: push a la rama 'deploy'
# Construye y publica AMBAS imágenes (Ventas + Despachos)
# Luego despliega en el EC2 Backend (subred privada)

name: CI/CD Backend — Innovatech Chile

on:
  push:
    branches:
      - deploy

env:
  IMAGE_VENTAS:    ${{ secrets.DOCKERHUB_USERNAME }}/backend-ventas
  IMAGE_DESPACHOS: ${{ secrets.DOCKERHUB_USERNAME }}/backend-despachos

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # JOB 1A: Build y Push imagen Ventas
  # ─────────────────────────────────────────────────────────────────────
  build-ventas:
    name:  Build & Push — Servicio Ventas
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name:  Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name:  Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name:  Metadata Ventas
        id: meta-ventas
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_VENTAS }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name:  Build & Push Ventas
        uses: docker/build-push-action@v5
        with:
          context: ./Springboot-API-REST
          dockerfile: ./Springboot-API-REST/Dockerfile
          push: true
          tags: ${{ steps.meta-ventas.outputs.tags }}
          labels: ${{ steps.meta-ventas.outputs.labels }}
          cache-from: type=gha,scope=ventas
          cache-to: type=gha,mode=max,scope=ventas

  # ─────────────────────────────────────────────────────────────────────
  # JOB 1B: Build y Push imagen Despachos (en paralelo con Ventas)
  # ─────────────────────────────────────────────────────────────────────
  build-despachos:
    name:  Build & Push — Servicio Despachos
    runs-on: ubuntu-latest

    steps:
      - name:  Checkout código fuente
        uses: actions/checkout@v4

      - name:  Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name:  Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name:  Metadata Despachos
        id: meta-despachos
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_DESPACHOS }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name:  Build & Push Despachos
        uses: docker/build-push-action@v5
        with:
          context: ./Springboot-API-REST-DESPACHO
          dockerfile: ./Springboot-API-REST-DESPACHO/Dockerfile
          push: true
          tags: ${{ steps.meta-despachos.outputs.tags }}
          labels: ${{ steps.meta-despachos.outputs.labels }}
          cache-from: type=gha,scope=despachos
          cache-to: type=gha,mode=max,scope=despachos

  # ─────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy en EC2 Backend — espera que ambos builds terminen OK
  # ─────────────────────────────────────────────────────────────────────
  deploy:
    name:  Deploy en EC2 Backend
    runs-on: ubuntu-latest
    needs: [build-ventas, build-despachos]

    steps:
      - name:  Checkout (para copiar docker-compose e init.sql)
        uses: actions/checkout@v4

      - name:  Copiar archivos de orquestación al EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_BACKEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,init.sql,.env.example"
          target: "/home/ubuntu/backend"

      - name: Deploy en EC2 vía SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_BACKEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 120s
          script: |
            echo "=========================================="
            echo "  Iniciando despliegue Backend"
            echo "=========================================="

            cd /home/ubuntu/backend

            # Login a Docker Hub desde EC2
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
              docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # Crear .env con los secrets de GitHub
            # (nunca se exponen en logs gracias a GitHub Secrets)
            cat > .env << 'ENVEOF'
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME_VENTAS=ventas_db
            DB_NAME_DESPACHOS=despachos_db
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            ENVEOF

            # Pull de las imágenes más recientes
            docker pull ${{ env.IMAGE_VENTAS }}:latest
            docker pull ${{ env.IMAGE_DESPACHOS }}:latest

            # Actualizar SOLO los servicios de app (sin recrear MySQL/volúmenes)
            # --no-deps: no recrea dependencias → MySQL y sus datos se preservan
            docker compose up -d --no-deps ventas despachos

            # Primera vez (o si MySQL no está corriendo): levantar todo
            # docker compose up -d

            # Verificar estado de todos los servicios
            echo "--- Estado del stack ---"
            docker compose ps

            # Mostrar logs recientes para verificar que arrancaron OK
            echo "--- Logs Ventas (últimas 10 líneas) ---"
            docker compose logs --tail=10 ventas

            echo "--- Logs Despachos (últimas 10 líneas) ---"
            docker compose logs --tail=10 despachos

            # Limpiar imágenes antiguas (liberar espacio en disco)
            docker image prune -f

            echo "=========================================="
            echo "   Despliegue Backend completado"
            echo "=========================================="
