name: CI/CD Backend — Innovatech Chile

on:
  push:
    branches:
      - deploy

env:
  IMAGE_VENTAS: tomasvaldivia20/backend-ventas
  IMAGE_DESPACHOS: tomasvaldivia20/backend-despachos

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # JOB 1A: Build y Push Servicio Ventas
  # ─────────────────────────────────────────────────────────────────────
  build-ventas:
    name: Build & Push — Servicio Ventas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: tomasvaldivia20
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Ventas
        uses: docker/build-push-action@v5
        with:
          context: ./back-Ventas_SpringBoot/Springboot-API-REST
          file: ./back-Ventas_SpringBoot/Springboot-API-REST/Dockerfile
          push: true
          tags: tomasvaldivia20/backend-ventas:latest
          cache-from: type=gha,scope=ventas
          cache-to: type=gha,mode=max,scope=ventas

  # ─────────────────────────────────────────────────────────────────────
  # JOB 1B: Build y Push Servicio Despachos
  # ─────────────────────────────────────────────────────────────────────
  build-despachos:
    name: Build & Push — Servicio Despachos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: tomasvaldivia20
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Despachos
        uses: docker/build-push-action@v5
        with:
          context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          file: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO/Dockerfile
          push: true
          tags: tomasvaldivia20/backend-despachos:latest
          cache-from: type=gha,scope=despachos
          cache-to: type=gha,mode=max,scope=despachos

  # ─────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy en EC2 Backend (SSH Proxy)
  # ─────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy en EC2 Backend
    runs-on: ubuntu-latest
    needs: [build-ventas, build-despachos]
    steps:
      - name: Checkout (archivos de config)
        uses: actions/checkout@v4

      - name: Copiar archivos al EC2 (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_BACKEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          proxy_host: ${{ secrets.EC2_FRONTEND_HOST }}   
          proxy_username: ${{ secrets.EC2_USER }}        
          proxy_key: ${{ secrets.EC2_SSH_KEY }}         
          source: "docker-compose.yml,init.sql,.env.example"
          target: "/home/ubuntu/backend"
          timeout: 60s

      - name: Deploy en EC2 vía SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          IMAGE_VENTAS: ${{ env.IMAGE_VENTAS }}
          IMAGE_DESPACHOS: ${{ env.IMAGE_DESPACHOS }}
        with:
          host: ${{ secrets.EC2_BACKEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          proxy_host: ${{ secrets.EC2_FRONTEND_HOST }}
          proxy_username: ${{ secrets.EC2_USER }}
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 120s
          envs: DOCKERHUB_TOKEN,MYSQL_ROOT_PASSWORD,DB_USERNAME,DB_PASSWORD,IMAGE_VENTAS,IMAGE_DESPACHOS
          script: |
            set -e
            
            echo "--- Limpieza preventiva ---"
            # Eliminamos el .env antiguo para que no herede errores de formato
            sudo rm -f /home/ubuntu/backend/.env
            
            echo "--- Preparando directorio ---"
            sudo mkdir -p /home/ubuntu/backend
            sudo chown -R ubuntu:ubuntu /home/ubuntu/backend
            cd /home/ubuntu/backend

            echo "--- Login Docker Hub ---"
            # Usamos una variable temporal para el login para evitar conflictos de símbolos
            export DOCKER_PASS="${DOCKERHUB_TOKEN}"
            echo "$DOCKER_PASS" | docker login -u tomasvaldivia20 --password-stdin

            echo "--- Generando archivo .env limpio ---"
            # Usamos comillas simples en el EOF para que Bash no intente interpretar nada dentro
            cat > .env << 'ENVEOF'
            MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
            DB_USERNAME=${DB_USERNAME}
            DB_PASSWORD=${DB_PASSWORD}
            DB_NAME_VENTAS=ventas_db
            DB_NAME_DESPACHOS=despachos_db
            DOCKERHUB_USERNAME=tomasvaldivia20
            ENVEOF
            
            # Sobrescribimos el .env con los valores reales de las envs de la sesión
            sed -i "s/\${MYSQL_ROOT_PASSWORD}/$MYSQL_ROOT_PASSWORD/" .env
            sed -i "s/\${DB_USERNAME}/$DB_USERNAME/" .env
            sed -i "s/\${DB_PASSWORD}/$DB_PASSWORD/" .env

            echo "--- Pull de imágenes ---"
            docker pull tomasvaldivia20/backend-ventas:latest
            docker pull tomasvaldivia20/backend-despachos:latest

            echo "--- Levantando servicios ---"
            # Forzamos a Docker Compose a ignorar errores de interpolación del sistema
            # y usamos el archivo .env que acabamos de crear
            docker-compose --env-file .env up -d --no-deps ventas despachos

            docker image prune -f
            echo "--- ¡Despliegue completado! ---"