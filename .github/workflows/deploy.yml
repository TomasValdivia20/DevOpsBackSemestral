name: CI/CD Backend — Innovatech Chile

on:
  push:
    branches:
      - deploy

env:
  # Definimos nombres completos para evitar fallos de formato
  IMAGE_VENTAS: tomasvaldivia20/backend-ventas
  IMAGE_DESPACHOS: tomasvaldivia20/backend-despachos

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # JOB 1A: Build y Push Servicio Ventas
  # ─────────────────────────────────────────────────────────────────────
  build-ventas:
    name: Build & Push — Servicio Ventas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: tomasvaldivia20
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Metadata Ventas
        id: meta-ventas
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_VENTAS }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build & Push Ventas
        uses: docker/build-push-action@v5
        with:
          context: ./Springboot-API-REST
          file: ./Springboot-API-REST/Dockerfile
          push: true
          tags: ${{ steps.meta-ventas.outputs.tags }}
          labels: ${{ steps.meta-ventas.outputs.labels }}
          cache-from: type=gha,scope=ventas
          cache-to: type=gha,mode=max,scope=ventas

  # ─────────────────────────────────────────────────────────────────────
  # JOB 1B: Build y Push Servicio Despachos
  # ─────────────────────────────────────────────────────────────────────
  build-despachos:
    name: Build & Push — Servicio Despachos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: tomasvaldivia20
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Metadata Despachos
        id: meta-despachos
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_DESPACHOS }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build & Push Despachos
        uses: docker/build-push-action@v5
        with:
          context: ./Springboot-API-REST-DESPACHO
          file: ./Springboot-API-REST-DESPACHO/Dockerfile
          push: true
          tags: ${{ steps.meta-despachos.outputs.tags }}
          labels: ${{ steps.meta-despachos.outputs.labels }}
          cache-from: type=gha,scope=despachos
          cache-to: type=gha,mode=max,scope=despachos

  # ─────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy en EC2 Backend (Usando SSH Proxy)
  # ─────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy en EC2 Backend
    runs-on: ubuntu-latest
    needs: [build-ventas, build-despachos]
    steps:
      - name: Checkout (archivos de config)
        uses: actions/checkout@v4

      - name: Copiar archivos al EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_BACKEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          proxy_host: ${{ secrets.EC2_FRONTEND_HOST }}   
          proxy_username: ${{ secrets.EC2_USER }}        
          proxy_key: ${{ secrets.EC2_SSH_KEY }}         
          source: "docker-compose.yml,init.sql,.env.example"
          target: "/home/ubuntu/backend"

      - name: Deploy en EC2 vía SSH
        uses: appleboy/ssh-action@v1.0.3
        # Cargamos los secretos en el entorno local del corredor
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          IMAGE_VENTAS: ${{ env.IMAGE_VENTAS }}
          IMAGE_DESPACHOS: ${{ env.IMAGE_DESPACHOS }}
        with:
          host: ${{ secrets.EC2_BACKEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          proxy_host: ${{ secrets.EC2_FRONTEND_HOST }}
          proxy_username: ${{ secrets.EC2_USER }}
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 120s
          # Pasamos estas variables a la sesión SSH
          envs: DOCKERHUB_TOKEN,MYSQL_ROOT_PASSWORD,DB_USERNAME,DB_PASSWORD,IMAGE_VENTAS,IMAGE_DESPACHOS
          script: |
            set -e
            cd /home/ubuntu/backend

            echo "--- Login Docker Hub ---"
            echo "$DOCKERHUB_TOKEN" | docker login -u tomasvaldivia20 --password-stdin

            echo "--- Creando archivo .env actualizado ---"
            cat > .env << ENVEOF
            MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD
            DB_USERNAME=$DB_USERNAME
            DB_PASSWORD=$DB_PASSWORD
            DB_NAME_VENTAS=ventas_db
            DB_NAME_DESPACHOS=despachos_db
            DOCKERHUB_USERNAME=tomasvaldivia20
            ENVEOF

            echo "--- Descargando imágenes nuevas ---"
            docker pull $IMAGE_VENTAS:latest
            docker pull $IMAGE_DESPACHOS:latest

            echo "--- Reiniciando stack con Docker Compose ---"
            # Levantamos los servicios de Java sin tumbar la DB
            docker compose up -d --no-deps ventas despachos

            docker image prune -f
            echo "--- Despliegue de Backend completado exitosamente ---"