spring.application.name=Springboot-API-REST

# Configuraci�n de la base de datos MySQL en AWS RDS
spring.datasource.url=jdbc:mysql://${DB_ENDPOINT_VENTAS}:${DB_PORT_VENTAS}/${DB_NAME_VENTAS}?sslMode=DISABLED&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME_VENTAS}
spring.datasource.password=${DB_PASSWORD_VENTAS}
spring.datasource.platform=mysql

# Configuraci�n de Hibernate
spring.jpa.database=mysql
#spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

springdoc.swagger-ui.path=/swagger-ui.html

server.port=${SERVICE_PORT:8081}